; HERMES PHP COMMAND SERVER - КОНФИГУРАЦИЯ
; ============================================================

[paths]
php_path = D:\PortableAI\PHP\php.exe
runas_path = D:\PortableAI\PHP\_Run\RunAsCPP.exe
temp_dir = D:\PortableAI\temp
log_file = D:\PortableAI\DostupHermes\server.log


[user]
; Пользователь для выполнения команд
username = HermesAgent
password = 123

[allowed_dirs]
; Разрешенные каталоги (через запятую)
dirs = D:\PortableAI\DostupHermes, D:\PortableAI\temp, D:\PortableAI\PHP\_Run, D:\PortableAI\PHP

[security]
; отключаем контроль каталогов, если сервер запущен в песочнице SandBoxie
enable_path_check = false
; true - использовать RunAsCPP.exe (выполнение от имени HermesAgent)
; false - использовать shell_exec (выполнение от имени текущего пользователя). Если сервер запущен в песочнице SandBoxie, то безопасно
use_runas = false
; true - можно давать команду серверу выполнить PHP-скрипт из указанного файла. Если сервер запущен в песочнице SandBoxie относительно безопасно
allow_php_execution = true

[server]
; Версия сервера
version = 3.2.1
date = 2026-06-16

[blocked_commands]
; Заблокированные команды (через запятую)
commands = format, diskpart, shutdown, taskkill, del /f, rmdir /s, rd /s, takeown, cacls, icacls, reg, sc, bcdedit, net user, net localgroup, whoami, attrib, cipher, compact, convert, fsutil, wmic, systeminfo, netsh, start, open, explorer, wsl, bash



