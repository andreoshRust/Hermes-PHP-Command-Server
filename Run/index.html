<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Command Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', 'Fira Code', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .version-badge {
            display: inline-block;
            background: #4a4e69;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #c9d1d9;
        }
        .server-status {
            display: inline-block;
            background: #2ea043;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        .command-input {
            width: 100%;
            padding: 15px;
            background: #1a1a2e;
            border: 2px solid #4a4e69;
            border-radius: 12px;
            color: #cdd6f4;
            font-family: monospace;
            font-size: 1rem;
        }
        .command-input:focus {
            outline: none;
            border-color: #a8edea;
            box-shadow: 0 0 10px rgba(168,237,234,0.3);
        }
        button {
            padding: 12px 24px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .btn-init { background: #a6e3a1; color: #1a1a2e; }
        .btn-execute { background: #89b4fa; color: #1a1a2e; }
        .btn-help { background: #cba6f7; color: #1a1a2e; }
        .btn-doc { background: #f9e2af; color: #1a1a2e; }
        .btn-clear { background: #f38ba8; color: #1a1a2e; }
        .output-content {
            background: #0d0d1a;
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            color: #cdd6f4;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }
        .status-message {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .status-waiting {
            background: #f9e2af20;
            border-left: 4px solid #f9e2af;
            color: #f9e2af;
        }
        .status-ready {
            background: #a6e3a120;
            border-left: 4px solid #a6e3a1;
            color: #a6e3a1;
        }
        .status-error {
            background: #f38ba820;
            border-left: 4px solid #f38ba8;
            color: #f38ba8;
        }
        .file-list li {
            margin: 15px 0;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 8px;
            list-style: none;
        }
        .file-list li:hover {
            background: #313244;
        }
        .view-btn {
            background: #89b4fa;
            color: #1a1a2e;
            padding: 5px 10px;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        hr {
            border-color: #4a4e69;
            margin: 15px 0;
        }
        .timing-info {
            text-align: right;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #6c7086;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🦊 Hermes Command Server</h1>
        <div>
            <span class="version-badge" id="serverVersion">v3.2.0</span>
            <span class="server-status" id="serverStatus">● Checking...</span>
        </div>
    </div>
    
    <div id="statusMessage" class="status-message status-waiting">
        ⚠️ Click "Initialize & Test" to setup password and test access
    </div>
    
    <input type="text" id="commandInput" class="command-input" 
           placeholder="cmd: dir D:\PortableAI" value="cmd: dir D:\PortableAI">
    <br><br>
    
    <button class="btn-init" onclick="initializeAndTest()">🔐 Initialize & Test</button>
    <button class="btn-execute" onclick="executeCommand()">▶ Execute</button>
    <button class="btn-doc" onclick="showDocList()">📄 Doc</button>
    <button class="btn-help" onclick="getHelp()">📖 Help</button>
    <button class="btn-clear" onclick="clearOutput()">🗑 Clear</button>
    
    <div id="outputContent" class="output-content" style="margin-top:20px;">Ready. Click "Initialize & Test" first.</div>
    <div id="timingInfo" class="timing-info"></div>
</div>

<script>
    const API = '/api.php';
    const AUTH = 'Bearer your_secret_token_here';

    async function getHelp() {
        const output = document.getElementById('outputContent');
        output.innerText = 'Loading help...';
        try {
            const res = await fetch(API + '?action=help', {headers: {'Authorization': AUTH}});
            const data = await res.json();
            if (data.version) {
                document.getElementById('serverVersion').innerText = 'v' + data.version;
                document.getElementById('serverStatus').innerHTML = '● Online';
                document.getElementById('serverStatus').style.background = '#2ea043';
            }
            output.innerText = data.help || JSON.stringify(data);
        } catch(e) {
            output.innerText = 'Error: ' + e.message;
        }
    }

    async function initializeAndTest() {
        const output = document.getElementById('outputContent');
        const statusDiv = document.getElementById('statusMessage');
        output.innerText = '🔐 Initializing...\n\nA PowerShell window may appear.\nPlease enter password: 123\n\nWaiting for response...';
        statusDiv.className = 'status-message status-waiting';
        
        try {
            const startTime = Date.now();
            const res = await fetch(API, {
                method: 'POST',
                headers: {'Authorization': AUTH, 'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'execute', query: 'cmd: echo "Server ready" && dir D:\\PortableAI'})
            });
            const data = await res.json();
            const duration = Date.now() - startTime;
            
            if (data.version) {
                document.getElementById('serverVersion').innerText = 'v' + data.version;
            }
            
            if (data.status === 'success') {
                statusDiv.className = 'status-message status-ready';
                statusDiv.innerHTML = '✅ Initialized! Password saved. Server is ready.';
                document.getElementById('serverStatus').innerHTML = '● Online';
                document.getElementById('serverStatus').style.background = '#2ea043';
                output.innerText = '✅ INITIALIZATION SUCCESSFUL!\n\nTest result:\n' + data.result;
                document.getElementById('timingInfo').innerText = 'Response time: ' + duration + ' ms';
            } else {
                statusDiv.className = 'status-message status-error';
                statusDiv.innerHTML = '❌ Initialization failed. Check console.';
                output.innerText = 'Error: ' + JSON.stringify(data);
            }
        } catch(e) {
            statusDiv.className = 'status-message status-error';
            statusDiv.innerHTML = '❌ Connection error: ' + e.message;
            output.innerText = 'Error: ' + e.message;
        }
    }

    async function executeCommand() {
        const cmd = document.getElementById('commandInput').value;
        const output = document.getElementById('outputContent');
        const timingSpan = document.getElementById('timingInfo');
        
        if (!cmd.toLowerCase().startsWith('cmd:')) {
            output.innerText = 'Error: Command must start with "cmd:"\nExample: cmd: dir D:\\PortableAI';
            return;
        }
        
        output.innerText = 'Executing...';
        
        try {
            const startTime = Date.now();
            const res = await fetch(API, {
                method: 'POST',
                headers: {'Authorization': AUTH, 'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'execute', query: cmd})
            });
            const data = await res.json();
            const duration = Date.now() - startTime;
            
            if (data.status === 'success') {
                output.innerText = data.result;
                timingSpan.innerText = 'Response time: ' + duration + ' ms';
            } else {
                output.innerText = 'Error: ' + JSON.stringify(data);
            }
        } catch(e) {
            output.innerText = 'Error: ' + e.message;
        }
    }

    async function showDocList() {
        const output = document.getElementById('outputContent');
        output.innerText = 'Loading document list...';
        
        try {
            const res = await fetch('/Doc.md');
            if (!res.ok) {
                output.innerText = 'Doc.md not found. Please create the file first.';
                return;
            }
            const content = await res.text();
            
            const lines = content.split('\n');
            const files = [];
            
            for (let line of lines) {
                line = line.trim();
                if (line.match(/^[A-Z]:\\/)) {
                    files.push(line);
                }
            }
            
            if (files.length === 0) {
                output.innerText = 'No file paths found in Doc.md\n\nAdd lines like:\nD:\\path\\to\\file.md';
                return;
            }
            
            let html = '<div style="font-family: monospace;">';
            html += '<h3>📁 Доступные документы</h3>';
            html += '<hr>';
            html += '<ul class="file-list" style="list-style: none; padding-left: 0;">';
            
            for (let file of files) {
                const fileName = file.split('\\').pop();
                const dirPath = file.substring(0, file.lastIndexOf('\\'));
                html += `<li>`;
                html += `  📄 <strong style="color: #a6e3a1;">${escapeHtml(fileName)}</strong><br>`;
                html += `  <span style="font-size: 0.75rem; color: #6c7086;">📁 ${escapeHtml(dirPath)}</span><br>`;
                html += `  <button onclick="viewFileContent('${escapeJs(file)}')" class="view-btn">👁️ Просмотр</button>`;
                html += `</li>`;
            }
            
            html += '</ul>';
            html += '<hr>';
            html += '<p style="font-size: 0.75rem; color: #6c7086;">💡 Чтобы добавить файлы, отредактируйте Doc.md</p>';
            html += '</div>';
            
            output.innerHTML = html;
            
        } catch(e) {
            output.innerText = 'Error loading Doc.md: ' + e.message;
        }
    }

async function viewFileContent(filePath) {
    const output = document.getElementById('outputContent');
    const timingSpan = document.getElementById('timingInfo');
    output.innerText = `Чтение: ${filePath}\n\nЗагрузка...`;
    
    try {
        const startTime = Date.now();
        const res = await fetch(API, {
            method: 'POST',
            headers: {'Authorization': AUTH, 'Content-Type': 'application/json'},
            body: JSON.stringify({
                action: 'execute', 
                query: `cmd:powershell -Command "$c = Get-Content -Path '${filePath}' -Encoding UTF8 -Raw -ErrorAction SilentlyContinue; if ($c) { Write-Output $c } else { Write-Output 'Файл пуст или не найден' }"`
            })
        });
        const data = await res.json();
        const duration = Date.now() - startTime;
        
        if (data.status === 'success') {
            output.innerText = `📄 ${filePath}\n`;
            output.innerText += '━'.repeat(50) + '\n\n';
            output.innerText += data.result;
            timingSpan.innerText = 'Loaded in ' + duration + ' ms';
        } else {
            output.innerText = `Ошибка чтения файла: ${JSON.stringify(data)}`;
        }
    } catch(e) {
        output.innerText = `Ошибка: ${e.message}`;
    }
}

    function clearOutput() {
        document.getElementById('outputContent').innerHTML = '';
        document.getElementById('timingInfo').innerHTML = '';
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function escapeJs(str) {
        return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
    }

    // Auto-check server version on load
    getHelp();
</script>
</body>
</html>
